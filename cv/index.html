<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Resume</title>

<style>
html, body {
    margin: 0;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

.topbar {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 1000;
}

.download-btn {
    background: #2563eb;
    color: white;
    padding: 12px 20px;
    text-decoration: none;
    border-radius: 6px;
    font-weight: bold;
}

.download-btn:hover {
    background: #1d4ed8;
}

.pdf-viewer {
    width: 100%;
    height: 100vh;
    border: none;
}
</style>
</head>
<body>

<div class="topbar">
    <a class="download-btn" href="Sumit_Kumar_CV.pdf" download>
        Download CV
    </a>
</div>

<iframe
    class="pdf-viewer"
    src="Sumit_Kumar_CV.pdf">
</iframe>

</body>
</html>
